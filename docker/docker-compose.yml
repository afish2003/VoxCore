# VoxCore — Local SearXNG Instance
#
# Provides a reliable localhost search backend so VoxCore doesn't depend
# on public SearXNG instances that rate-limit or go down.
#
# Usage:
#   docker compose -f docker/docker-compose.yml up -d
#
# VoxCore connects to http://127.0.0.1:8080 by default (first entry
# in SEARX_INSTANCES). Public instances are used as fallbacks.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: voxcore-searxng
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    restart: unless-stopped
